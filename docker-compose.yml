services:
  postgres:
    image: postgres:16-alpine
    container_name: incident-sys-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incident_security
    ports:
      - "5432:5432"
    volumes:
      - incident_pgdata:/var/lib/postgresql/data

volumes:
  incident_pgdata:
